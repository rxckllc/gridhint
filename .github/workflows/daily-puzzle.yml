name: Daily Puzzle Update

# Three staggered cron triggers, one per game.
# Times in UTC because GitHub Actions cron is UTC-only.
# 09:00 UTC = 5:00 AM EDT (summer) / 4:00 AM EST (winter)
# All three games are safely live by 03:00 ET (Spelling Bee = latest);
# 5 AM ET buffers Akamai propagation + avoids the West-Coast-midnight rush.
# 5-minute stagger spreads the fetches per the original anti-bot brief.
on:
  schedule:
    - cron: '0 9 * * *'   # 5:00 AM EDT — Connections
    - cron: '5 9 * * *'   # 5:05 AM EDT — Wordle
    - cron: '10 9 * * *'  # 5:10 AM EDT — Spelling Bee
  workflow_dispatch:
    inputs:
      game:
        description: 'Which game to fetch (manual trigger only)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - connections
          - wordle
          - spelling-bee

# GitHub keeps at most one pending run per concurrency group. Include the
# schedule expression or manual input so a delayed run for one game cannot
# cancel the next game's pending refresh.
concurrency:
  group: daily-puzzle-${{ github.event.schedule || github.event.inputs.game || github.run_id }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
      GRIDHINT_FALLBACK_EYEFYRE: ${{ vars.GRIDHINT_FALLBACK_EYEFYRE || '0' }}
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so `git pull --rebase` can compute
          # a merge base when a prior cron run pushed during ours.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Resolve target game from the cron expression that triggered this run.
      # github.event.schedule is set by GitHub's scheduler, not the runner clock,
      # so it's reliable even if a queued run starts late.
      # IMPORTANT: keep this case statement in sync with the `on.schedule:` list above.
      - name: Determine target game
        id: which
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GAME="${{ github.event.inputs.game }}"
          else
            case "${{ github.event.schedule }}" in
              "0 9 * * *")  GAME="connections" ;;
              "5 9 * * *")  GAME="wordle" ;;
              "10 9 * * *") GAME="spelling-bee" ;;
              *)            GAME="all" ;;
            esac
          fi
          echo "game=$GAME" >> "$GITHUB_OUTPUT"
          echo "Resolved target game: $GAME (schedule=${{ github.event.schedule }} event=${{ github.event_name }})"

      - name: Fetch Connections
        id: connections
        if: steps.which.outputs.game == 'connections' || steps.which.outputs.game == 'all'
        continue-on-error: true
        run: npx tsx src/scripts/import-daily-puzzles.ts

      - name: Fetch Wordle
        id: wordle
        if: steps.which.outputs.game == 'wordle' || steps.which.outputs.game == 'all'
        continue-on-error: true
        run: npx tsx src/scripts/import-daily-wordle.ts

      - name: Fetch Spelling Bee
        id: spelling-bee
        if: steps.which.outputs.game == 'spelling-bee' || steps.which.outputs.game == 'all'
        continue-on-error: true
        run: npm run data:import:spelling-bee

      - name: Validate generated files
        id: validate
        continue-on-error: true
        run: npx tsx src/scripts/validate-generated.ts

      # Pull --rebase before push so a slower preceding cron run that hasn't
      # finished pushing yet doesn't reject this push. Concurrency group
      # already prevents overlap, but this is belt-and-suspenders.
      - name: Commit and push
        id: commit
        if: always()
        run: |
          git config user.name "gridhint-bot"
          git config user.email "bot@gridhint.com"
          git add src/data/generated/ && git add -A .gridhint-cooldown.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(date -u +'%Y-%m-%d')
          GAME="${{ steps.which.outputs.game }}"
          git commit --no-verify -m "daily: $GAME update $DATE"
          # Rebase onto latest origin in case a prior run pushed during ours.
          # No `|| true` — if rebase has conflicts, fail the step loud rather
          # than push a state that overwrites the upstream commit.
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after rebase..."
            sleep 5
          done
          echo "::error::git push failed after 3 attempts"
          exit 1

      # IndexNow ping — only runs if we actually pushed new content.
      # The script polls Hostinger for today's date in the page body BEFORE
      # submitting (cache-buster + no-cache headers), so we don't ping
      # before the deploy lands.
      - name: Ping IndexNow
        if: always() && steps.commit.outputs.pushed == 'true'
        continue-on-error: true
        env:
          GRIDHINT_INDEXNOW_TARGET: ${{ steps.which.outputs.game }}
        run: npx tsx src/scripts/ping-indexnow.ts

      - name: Report partial failures
        if: always()
        run: |
          GAME="${{ steps.which.outputs.game }}"
          C="${{ steps.connections.outcome }}"
          W="${{ steps.wordle.outcome }}"
          B="${{ steps.spelling-bee.outcome }}"
          V="${{ steps.validate.outcome }}"
          M="${{ steps.commit.outcome }}"
          echo "Target: $GAME | connections=$C wordle=$W spelling-bee=$B validate=$V commit=$M"
          FAIL=0
          if [ "$GAME" = "connections" ] || [ "$GAME" = "all" ]; then
            [ "$C" = "success" ] || FAIL=1
          fi
          if [ "$GAME" = "wordle" ] || [ "$GAME" = "all" ]; then
            [ "$W" = "success" ] || FAIL=1
          fi
          if [ "$GAME" = "spelling-bee" ] || [ "$GAME" = "all" ]; then
            [ "$B" = "success" ] || FAIL=1
          fi
          [ "$V" = "success" ] || FAIL=1
          # commit step is critical — failure means rebase conflict, push rejection,
          # or git auth issue. Surface as run failure.
          [ "$M" = "success" ] || FAIL=1
          if [ "$FAIL" = "1" ]; then
            echo "::error::One or more steps did not succeed for target=$GAME"
            exit 1
          fi
