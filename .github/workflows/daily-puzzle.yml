name: Daily Puzzle Update

# Cloudflare Worker Cron is the only scheduler for this workflow.
# Keep workflow_dispatch so each game can still be fired manually from GitHub UI
# or by the Worker via the Actions API.
on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Which game to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - connections
          - wordle
          - spelling-bee

# Keep each game independent. A Worker retry for Wordle must not cancel a
# Connections or Spelling Bee run that is still in progress.
concurrency:
  group: daily-puzzle-${{ github.event.inputs.game || github.run_id }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
      GRIDHINT_FALLBACK_EYEFYRE: ${{ vars.GRIDHINT_FALLBACK_EYEFYRE || '0' }}
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so `git pull --rebase` can compute
          # a merge base when a prior run pushed during ours.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Determine target game
        id: which
        run: |
          GAME="${{ github.event.inputs.game || 'all' }}"
          echo "game=$GAME" >> "$GITHUB_OUTPUT"
          echo "Resolved target game: $GAME (event=${{ github.event_name }})"

      - name: Fetch Connections
        id: connections
        if: steps.which.outputs.game == 'connections' || steps.which.outputs.game == 'all'
        continue-on-error: true
        run: npx tsx src/scripts/import-daily-puzzles.ts

      - name: Fetch Wordle
        id: wordle
        if: steps.which.outputs.game == 'wordle' || steps.which.outputs.game == 'all'
        continue-on-error: true
        run: npx tsx src/scripts/import-daily-wordle.ts

      - name: Fetch Spelling Bee
        id: spelling-bee
        if: steps.which.outputs.game == 'spelling-bee' || steps.which.outputs.game == 'all'
        continue-on-error: true
        run: npm run data:import:spelling-bee

      - name: Validate generated files
        id: validate
        continue-on-error: true
        run: npx tsx src/scripts/validate-generated.ts

      - name: Commit and push
        id: commit
        if: always()
        run: |
          git config user.name "gridhint-bot"
          git config user.email "bot@gridhint.com"
          git add src/data/generated/ && git add -A .gridhint-cooldown.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(date -u +'%Y-%m-%d')
          GAME="${{ steps.which.outputs.game }}"
          git commit --no-verify -m "daily: $GAME update $DATE"
          # Rebase onto latest origin in case a prior Worker tick pushed first.
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after rebase..."
            sleep 5
          done
          echo "::error::git push failed after 3 attempts"
          exit 1

      - name: Ping IndexNow
        if: always() && steps.commit.outputs.pushed == 'true'
        continue-on-error: true
        env:
          GRIDHINT_INDEXNOW_TARGET: ${{ steps.which.outputs.game }}
        run: npx tsx src/scripts/ping-indexnow.ts

      - name: Commit IndexNow status
        id: indexnow-status
        if: always() && steps.commit.outputs.pushed == 'true'
        run: |
          git add src/data/generated/*/indexnow-status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No IndexNow status changes to commit"
            exit 0
          fi
          DATE=$(date -u +'%Y-%m-%d')
          GAME="${{ steps.which.outputs.game }}"
          git commit --no-verify -m "daily: $GAME indexnow status $DATE"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "IndexNow status push attempt $attempt failed; retrying after rebase..."
            sleep 5
          done
          echo "::error::IndexNow status push failed after 3 attempts"
          exit 1

      - name: Report partial failures
        if: always()
        run: |
          GAME="${{ steps.which.outputs.game }}"
          C="${{ steps.connections.outcome }}"
          W="${{ steps.wordle.outcome }}"
          B="${{ steps.spelling-bee.outcome }}"
          V="${{ steps.validate.outcome }}"
          M="${{ steps.commit.outcome }}"
          S="${{ steps.indexnow-status.outcome }}"
          echo "Target: $GAME | connections=$C wordle=$W spelling-bee=$B validate=$V commit=$M indexnow-status=$S"
          FAIL=0
          if [ "$GAME" = "connections" ] || [ "$GAME" = "all" ]; then
            [ "$C" = "success" ] || FAIL=1
          fi
          if [ "$GAME" = "wordle" ] || [ "$GAME" = "all" ]; then
            [ "$W" = "success" ] || FAIL=1
          fi
          if [ "$GAME" = "spelling-bee" ] || [ "$GAME" = "all" ]; then
            [ "$B" = "success" ] || FAIL=1
          fi
          [ "$V" = "success" ] || FAIL=1
          [ "$M" = "success" ] || FAIL=1
          [ "$S" = "success" ] || [ "$S" = "skipped" ] || FAIL=1
          if [ "$FAIL" = "1" ]; then
            echo "::error::One or more steps did not succeed for target=$GAME"
            exit 1
          fi
